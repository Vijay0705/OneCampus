name: onecampus
description: OneCampus - Smart College Super App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Networking
  http: ^1.1.2

  # Storage
  flutter_secure_storage: ^9.0.0

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # Files
  file_picker: ^8.0.7
  url_launcher: ^6.3.1

  # Utils
  collection: ^1.18.0
  intl: ^0.19.0
  uuid: ^4.4.0

  # Permissions
  permission_handler: ^11.3.1

  # Map (OpenStreetMap — no Google Maps)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^11.0.0

  # Firebase (compatible versions)
  firebase_core: ^2.32.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7
  firebase_messaging: ^14.7.10

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/